<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InakiOG's Vinyl Collection</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="topbar">
    <span id="count" class="count"></span>
    <button id="shuffle" class="shuffle-btn" title="Show a random album" aria-label="Show a random album">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="16 3 21 3 21 8"></polyline>
        <line x1="4" y1="20" x2="21" y2="3"></line>
        <polyline points="21 16 21 21 16 21"></polyline>
        <line x1="15" y1="15" x2="21" y2="21"></line>
        <line x1="4" y1="4" x2="9" y2="9"></line>
      </svg>
    </button>
  </div>

  <main id="grid" class="grid"></main>

  <p id="status" class="status">Loading collection…</p>

  <div id="overlay" class="overlay hidden">
    <div class="overlay-backdrop"></div>
    <div class="overlay-card">
      <img id="overlay-img" src="" alt="">
      <div class="overlay-info">
        <h2 id="overlay-title"></h2>
        <p id="overlay-artist"></p>
        <p id="overlay-meta"></p>
        <p id="overlay-genres"></p>
        <a id="overlay-link" href="" target="_blank" rel="noopener">View on Discogs →</a>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
